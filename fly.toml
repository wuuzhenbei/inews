app = 'inews'
primary_region = 'hkg'

[build]

[env]
  PORT = '5000'
  CORS_ORIGINS = 'https://inews.050311.xyz,http://localhost:5000'

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'

[mounts]
  source = 'inews_data'
  destination = '/app/data'
